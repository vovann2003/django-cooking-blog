{% extends "../base.html" %}

{% block title %}
  Главная страница
{% endblock %}

{% block content %}
  {% if request.user.is_authenticated %}
    Добро пожаловать, {{ request.user.username }}!
    <a href="{% url 'logout' %}">Выйти</a>
  {% else %}
    <a href="{% url 'register' %}">Зарегестрироваться</a>
    <a href="{% url 'login' %}">Войти</a>
  {% endif %}
{% endblock %}
