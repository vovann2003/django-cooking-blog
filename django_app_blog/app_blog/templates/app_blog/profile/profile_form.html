{% extends "../base.html" %}

{% block title %}
  Регистрация
{% endblock %}

{% block content %}
  <form method="post">
    {% csrf_token %}
    {% for f in form %}
      <p><label for="{{ f.id_for_label }}">{{ f.label }}: </label>{{ f }}</p>
      <div class="form-error">{{ f.errors }}</div>
    {% endfor %}
    <button type="submit">Зарегестрироваться</button>
  </form>
{% endblock %}
